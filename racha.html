<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="transparent" />

  <title>Kanelista · Racha semanal</title>

  <link rel="stylesheet" href="racha.css?v=20260718-1" />
  <script src="racha.js?v=20260718-1" defer></script>
</head>

<body>
  <main class="widget-shell">
    <article class="week-card" id="weekCard">
      <span class="ambient ambient-one" aria-hidden="true"></span>
      <span class="ambient ambient-two" aria-hidden="true"></span>

      <section class="streak-summary" aria-label="Resumen de la semana">
        <div class="streak-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M27.8 4.6c1.4 6.5-1.6 9.8-5.1 13.4-3.1 3.2-6.5 6.8-6.5 12.3 0 4.2 3.5 7.7 7.8 7.7 4.5 0 8.1-3.4 8.1-8 0-2.3-.8-4.5-2.5-6.7 4.9 2.4 8.1 7.3 8.1 12.8 0 7.1-5.8 12.8-13 12.8S11.6 43.2 11.6 36c0-7.6 4.5-12.4 8.5-16.7 4.4-4.7 8.2-8.8 7.7-14.7Z"/>
          </svg>
        </div>

        <div class="streak-copy">
          <p class="eyebrow">RACHA ACTUAL</p>
          <div class="streak-value">
            <strong id="streakNumber">1</strong>
            <span id="streakUnit">día</span>
          </div>
          <p class="streak-note" id="streakNote">Hoy empezamos suave.</p>
        </div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="week-progress" aria-label="Progreso semanal">
        <header class="progress-header">
          <div>
            <p class="eyebrow">PROGRESO DE LA SEMANA</p>
            <p class="progress-copy" id="progressCopy">Viernes · 5 de 7 días</p>
          </div>

          <strong class="progress-percent" id="progressPercent">71%</strong>
        </header>

        <div class="week-track" id="weekTrack" aria-label="Días de la semana"></div>

        <footer class="progress-footer">
          <div class="bar" aria-hidden="true">
            <span id="barFill"></span>
          </div>

          <p id="weekMessage">Ya cruzaste la mitad de la semana.</p>
        </footer>
      </section>
    </article>
  </main>
</body>
</html>
