<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Kanelista · Agenda</title>
  <link rel="stylesheet" href="agenda.css?v=20260717-3" />
  <script src="agenda.js?v=20260717-3" defer></script>
</head>
<body>
  <main class="widget-shell">
    <article class="agenda-card" id="agendaCard" data-period="night">
      <span class="glow glow-left" aria-hidden="true"></span>
      <span class="glow glow-right" aria-hidden="true"></span>

      <section class="date-side" aria-label="Fecha actual">
        <p class="eyebrow">AGENDA · HOY</p>

        <div class="date-main">
          <div class="date-big">
            <span class="day-number" id="dayNumber">17</span>
          </div>

          <div class="date-meta">
            <p class="weekday" id="weekday">Viernes</p>
            <p class="month" id="month">Julio</p>
            <p class="yearline">
              <span id="year">2026</span>
              <span class="dot">•</span>
              <span id="weekLabel">Semana 29</span>
            </p>
          </div>
        </div>

        <p class="message" id="message">Organiza tu día sin ahogarte en él.</p>

        <div class="date-bottom">
          <span class="time" id="clock">22:46</span>
          <span class="sep">·</span>
          <span class="timezone" id="timezoneLabel">UTC−5</span>
        </div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="weather-side" aria-label="Clima actual">
        <div class="weather-top">
          <button class="location" id="locationButton" type="button" title="Usar mi ubicación">
            <span class="pin">⌾</span>
            <span id="locationName">Lima</span>
          </button>

          <span class="live-pill">
            <span class="live-dot"></span>
            <span id="updatedLabel">AHORA</span>
          </span>
        </div>

        <div class="weather-main">
          <div class="icon-wrap" id="weatherIcon" aria-hidden="true"></div>

          <div class="weather-text">
            <div class="temp-line">
              <span class="temp" id="temperature">23</span>
              <span class="temp-degree">°</span>
            </div>
            <p class="condition" id="condition">Cielo despejado</p>
            <p class="feels-like" id="feelsLike">Sensación térmica 23°</p>
          </div>
        </div>

        <div class="weather-chips">
          <div class="chip">
            <span class="chip-label">Máx / mín</span>
            <strong id="highLow">24° / 23°</strong>
          </div>

          <div class="chip">
            <span class="chip-label">Lluvia</span>
            <strong id="rainChance">0%</strong>
          </div>

          <div class="chip">
            <span class="chip-label">Humedad</span>
            <strong id="humidity">80%</strong>
          </div>

          <div class="chip">
            <span class="chip-label">Viento</span>
            <strong id="wind">20 km/h</strong>
          </div>
        </div>

        <p class="weather-error" id="weatherError" hidden>
          No pude cargar el clima ahora mismo.
        </p>
      </section>
    </article>
  </main>
</body>
</html>
