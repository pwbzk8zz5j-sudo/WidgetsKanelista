<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="transparent" />

  <title>Kanelista — Agenda</title>

  <link rel="stylesheet" href="agenda.css?v=20260717-1" />
  <script src="agenda.js?v=20260717-1" defer></script>
</head>

<body>
  <main class="widget-shell">
    <article class="agenda-card" id="agendaCard" data-period="night" data-weather="cloudy">
      <span class="shine" aria-hidden="true"></span>
      <span class="orb orb-one" aria-hidden="true"></span>
      <span class="orb orb-two" aria-hidden="true"></span>
      <span class="stars" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i>
      </span>

      <section class="date-panel" aria-label="Fecha actual">
        <header class="panel-header">
          <div>
            <p class="eyebrow">AGENDA · HOY</p>
            <p class="year" id="year">2026</p>
          </div>

          <div class="live-pill">
            <span class="live-dot" aria-hidden="true"></span>
            <span>EN VIVO</span>
          </div>
        </header>

        <div class="date-main">
          <p class="weekday" id="weekday">Viernes</p>

          <div class="day-row">
            <strong class="day-number" id="dayNumber">17</strong>

            <div class="month-block">
              <span class="month" id="month">Julio</span>
              <span class="date-caption" id="dateCaption">Semana 29</span>
            </div>
          </div>

          <p class="daily-message" id="dailyMessage">
            Un día a la vez, pero con estilo.
          </p>
        </div>

        <footer class="date-footer">
          <span class="clock-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="8.5"></circle>
              <path d="M12 7.2v5.2l3.4 2"></path>
            </svg>
          </span>

          <time class="clock" id="clock">19:00</time>
          <span class="timezone" id="timezoneLabel">UTC−5</span>
        </footer>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="weather-panel" aria-label="Clima actual">
        <header class="weather-header">
          <button class="location-button" id="locationButton" type="button" title="Usar mi ubicación">
            <span class="pin" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 21s6-5.1 6-11a6 6 0 1 0-12 0c0 5.9 6 11 6 11Z"></path>
                <circle cx="12" cy="10" r="2"></circle>
              </svg>
            </span>

            <span id="locationName">Lima</span>
          </button>

          <span class="updated" id="updatedLabel">Actualizando…</span>
        </header>

        <div class="weather-main">
          <div class="weather-icon" id="weatherIcon" aria-hidden="true">
            <svg viewBox="0 0 120 120">
              <circle class="sun-core" cx="45" cy="42" r="19"></circle>
              <path class="cloud-main" d="M36 84h51c12 0 21-8 21-19s-9-19-21-19c-3 0-6 .7-8.5 1.9C74.8 37 65 29.5 53.4 29.5 39.4 29.5 28 40.9 28 55v1.2C17.7 57.8 10 66.3 10 76.5 10 88.4 19.7 98 31.6 98H36Z"></path>
            </svg>
          </div>

          <div class="temperature-wrap">
            <div class="temperature-line">
              <strong id="temperature">--</strong>
              <span>°</span>
            </div>

            <p class="condition" id="condition">Cargando clima…</p>
            <p class="feels-like" id="feelsLike">Sensación térmica --°</p>
          </div>
        </div>

        <div class="weather-stats" aria-label="Detalles del clima">
          <div class="stat">
            <span class="stat-icon" aria-hidden="true">↕</span>
            <span class="stat-label">MÁX / MÍN</span>
            <strong id="highLow">--° / --°</strong>
          </div>

          <div class="stat">
            <span class="stat-icon" aria-hidden="true">◔</span>
            <span class="stat-label">LLUVIA</span>
            <strong id="rainChance">--%</strong>
          </div>

          <div class="stat">
            <span class="stat-icon" aria-hidden="true">◌</span>
            <span class="stat-label">HUMEDAD</span>
            <strong id="humidity">--%</strong>
          </div>

          <div class="stat">
            <span class="stat-icon" aria-hidden="true">⌁</span>
            <span class="stat-label">VIENTO</span>
            <strong id="wind">-- km/h</strong>
          </div>
        </div>

        <p class="weather-error" id="weatherError" hidden>
          No pude actualizar el clima. Mostrando la fecha con normalidad.
        </p>
      </section>
    </article>
  </main>
</body>
</html>
