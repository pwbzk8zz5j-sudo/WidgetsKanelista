<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanelista — Inicio</title>
  <link rel="stylesheet" href="inicio.css" />
</head>
<body>
  <main class="widget" aria-live="polite">
    <span class="glow one"></span><span class="glow two"></span>
    <span class="spark s1"></span><span class="spark small s2"></span><span class="spark s3"></span><span class="spark small s4"></span><span class="spark small s5"></span>
    <div class="content">
      <section>
        <h1 class="greeting"><span id="greeting">Buenos días</span>, <span class="name">Kanelista.</span></h1>
        <div class="time-row"><div id="clock" class="clock">08:46</div><div id="date" class="date">Viernes, 17 de julio</div></div>
      </section>
      <section class="message-wrap"><p id="message" class="message">Hoy también cuenta.</p></section>
    </div>
  </main>
  <script src="quotes.js"></script>
  <script src="inicio.js"></script>
</body>
</html>
