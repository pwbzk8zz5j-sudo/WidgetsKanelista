<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanelista — Separador interactivo</title>
  <link rel="stylesheet" href="centro.css" />
</head>
<body>
  <main class="divider-widget" id="widget">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <div class="line line-left"></div>

    <button class="core" id="core" type="button" aria-label="Cambiar mensaje">
      <span class="orbit orbit-one">
        <span class="satellite"></span>
      </span>
      <span class="orbit orbit-two">
        <span class="satellite"></span>
      </span>

      <span class="core-glow"></span>
      <span class="core-center">
        <span class="icon" id="icon">✦</span>
      </span>
    </button>

    <section class="copy" aria-live="polite">
      <p class="eyebrow">KANELISTA DASHBOARD</p>
      <h1 id="title">Todo empieza con una idea.</h1>
      <p id="hint">Toca el núcleo para cambiar de energía</p>
    </section>

    <div class="line line-right"></div>

    <span class="spark spark-one"></span>
    <span class="spark spark-two"></span>
    <span class="spark spark-three"></span>
    <span class="spark spark-four"></span>
  </main>

  <script src="centro.js"></script>
</body>
</html>
