<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="transparent" />

  <title>Kanelista · Portal</title>

  <link rel="stylesheet" href="centro.css?v=20260718-1" />
  <script src="centro.js?v=20260718-1" defer></script>
</head>

<body>
  <main class="widget-shell">
    <article class="portal-card" id="portalCard" aria-label="Portal Kanelista">
      <span class="ambient ambient-left" aria-hidden="true"></span>
      <span class="ambient ambient-right" aria-hidden="true"></span>

      <div class="particle-field" id="particleField" aria-hidden="true"></div>

      <section class="portal-stage">
        <button class="portal" id="portalButton" type="button" aria-label="Activar portal">
          <span class="ring ring-one"></span>
          <span class="ring ring-two"></span>
          <span class="ring ring-three"></span>

          <span class="portal-glow"></span>
          <span class="portal-core">
            <span class="core-shine"></span>
            <span class="core-symbol">✦</span>
          </span>

          <span class="pulse pulse-one"></span>
          <span class="pulse pulse-two"></span>
        </button>

        <div class="portal-copy">
          <p class="eyebrow">PORTAL KANELISTA</p>
          <h1 id="portalMessage">Vuelve al centro.</h1>
          <p class="hint">Toca el núcleo</p>
        </div>
      </section>
    </article>
  </main>
</body>
</html>
