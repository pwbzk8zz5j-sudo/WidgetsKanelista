<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="transparent" />

  <title>Kanelista — Boarding Pass</title>

  <link rel="stylesheet" href="trabajo.css?v=20260717-4" />
  <script src="trabajo.js?v=20260717-4" defer></script>
</head>

<body>
  <main class="widget-shell" aria-label="Widget de trabajo estilo pase de abordar">
    <article class="boarding-pass" id="boardingPass">
      <span class="edge-glow" aria-hidden="true"></span>
      <span class="ambient ambient-one" aria-hidden="true"></span>
      <span class="ambient ambient-two" aria-hidden="true"></span>

      <section class="ticket-main">
        <header class="ticket-header">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <path d="M42 22.2 28.7 18l-8-13.1-4.8-.1 4.5 12-10.6-2.9-4.2-5.1-3.3.2 2.8 8.3-2.5 8.4 3.3.1 4-5.4 10.8-2.2-5 11.7 4.8.1 8.5-12.6L42 26c2.1-.7 3.1-2.8 3.1-2.8S44.1 22.7 42 22.2Z"/>
              </svg>
            </span>

            <div>
              <p class="eyebrow">KANELISTA AIR</p>
              <h1>BOARDING PASS</h1>
            </div>
          </div>

          <div class="status-pill" id="statusPill" data-state="standby">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="statusText">STANDBY</span>
          </div>
        </header>

        <div class="route" aria-label="Ruta de Lima a Work">
          <div class="airport airport-origin">
            <span class="airport-code">LIM</span>
            <span class="airport-city">Lima</span>
          </div>

          <div class="flight-path" aria-hidden="true">
            <span class="path-line"></span>
            <span class="path-dot dot-start"></span>
            <span class="path-dot dot-end"></span>

            <span class="moving-plane">
              <svg viewBox="0 0 64 64">
                <path d="m57.8 29.3-18-6.2L29.1 5.8h-6l6.2 15-14.4-4.1-5.4-6.2H5.2l3.4 10.2-3.4 10.4h4.3l5.4-6.4 14.6-3.8-6.4 14.8h6l10.9-17 17.8-6.2c2.8-.9 4.2-3.3 4.2-3.3s-1.4-2.9-4.2-3.9Z"/>
              </svg>
            </span>
          </div>

          <div class="airport airport-destination">
            <span class="airport-code">WRK</span>
            <span class="airport-city">Work mode</span>
          </div>
        </div>

        <div class="details-grid">
          <div class="detail">
            <span class="detail-label">FECHA</span>
            <strong class="detail-value" id="dateValue">17 JUL</strong>
          </div>

          <div class="detail">
            <span class="detail-label">HORA LOCAL</span>
            <strong class="detail-value detail-time" id="timeValue">19:00</strong>
          </div>

          <div class="detail">
            <span class="detail-label">VUELO</span>
            <strong class="detail-value">KNL 420</strong>
          </div>

          <div class="detail">
            <span class="detail-label">PUERTA</span>
            <strong class="detail-value">04</strong>
          </div>
        </div>

        <footer class="ticket-footer">
          <p id="statusMessage">Lista para despegar cuando toque.</p>

          <div class="timezone">
            <span class="timezone-icon" aria-hidden="true">◷</span>
            <span id="timezoneValue">Lima · UTC−5</span>
          </div>
        </footer>
      </section>

      <div class="perforation" aria-hidden="true">
        <span class="perforation-line"></span>
      </div>

      <aside class="ticket-stub" aria-label="Talón del pase de abordar">
        <div class="stub-top">
          <span class="stub-label">CREW PASS</span>
          <span class="stub-number">04</span>
        </div>

        <div class="stub-center">
          <span class="stub-route">LIM</span>
          <span class="stub-plane" aria-hidden="true">✦</span>
          <span class="stub-route">WRK</span>
        </div>

        <div class="barcode" aria-hidden="true">
          <span style="--w: 2"></span><span style="--w: 1"></span>
          <span style="--w: 3"></span><span style="--w: 1"></span>
          <span style="--w: 2"></span><span style="--w: 4"></span>
          <span style="--w: 1"></span><span style="--w: 2"></span>
          <span style="--w: 3"></span><span style="--w: 1"></span>
          <span style="--w: 4"></span><span style="--w: 2"></span>
          <span style="--w: 1"></span><span style="--w: 3"></span>
          <span style="--w: 2"></span><span style="--w: 1"></span>
          <span style="--w: 4"></span><span style="--w: 2"></span>
          <span style="--w: 3"></span><span style="--w: 1"></span>
        </div>

        <div class="stub-bottom">
          <span>SEAT</span>
          <strong>CREW</strong>
        </div>
      </aside>
    </article>
  </main>
</body>
</html>
