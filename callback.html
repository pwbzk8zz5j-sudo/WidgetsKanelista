<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Conectando Spotify…</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
      background:#05070a;color:#f5f8fb;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    main{
      width:min(520px,100%);padding:38px;border:1px solid rgba(73,207,255,.22);
      border-radius:28px;text-align:center;
      background:linear-gradient(145deg,rgba(13,22,31,.95),rgba(7,13,19,.95));
      box-shadow:0 24px 70px rgba(0,0,0,.5),0 0 35px rgba(73,207,255,.12);
    }
    .orb{
      width:80px;height:80px;margin:0 auto 24px;border-radius:50%;
      border:1px solid rgba(185,239,255,.35);
      background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.25),transparent 25%),
                 rgba(73,207,255,.15);
      box-shadow:0 0 30px rgba(73,207,255,.25);
      animation:pulse 1.7s ease-in-out infinite;
    }
    h1{margin:0;font-size:clamp(1.7rem,6vw,2.5rem);letter-spacing:-.04em}
    p{color:#8fa2b5;line-height:1.65}
    a{color:#b9efff}
    @keyframes pulse{50%{transform:scale(1.08);box-shadow:0 0 46px rgba(73,207,255,.38)}}
  </style>
</head>
<body>
  <main>
    <div class="orb"></div>
    <h1 id="title">Conectando tu Spotify…</h1>
    <p id="message">Un segundo, estamos terminando la autorización.</p>
  </main>

  <script>
    const CLIENT_ID = "5386cabc1af846769d22adb4577396b2";
    const REDIRECT_URI = "https://pwbzk8zz5j-sudo.github.io/WidgetsKanelista/callback.html";
    const TOKEN_URL = "https://accounts.spotify.com/api/token";

    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const params = new URLSearchParams(window.location.search);

    function fail(text) {
      title.textContent = "No se pudo conectar.";
      message.innerHTML = text + '<br><br><a href="spotify.html">Volver al widget</a>';
    }

    async function exchangeCode(code) {
      const verifier = localStorage.getItem("spotify_code_verifier");
      const expectedState = localStorage.getItem("spotify_auth_state");
      const returnedState = params.get("state");

      if (!verifier) throw new Error("Falta el verificador de seguridad. Inicia la conexión nuevamente.");
      if (!expectedState || expectedState !== returnedState) {
        throw new Error("La validación de seguridad no coincide. Inicia la conexión nuevamente.");
      }

      const response = await fetch(TOKEN_URL, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: "authorization_code",
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error_description || "Spotify rechazó el intercambio del código.");

      localStorage.setItem("spotify_access_token", data.access_token);
      localStorage.setItem("spotify_token_expires_at", String(Date.now() + data.expires_in * 1000));

      if (data.refresh_token) {
        localStorage.setItem("spotify_refresh_token", data.refresh_token);
      }

      localStorage.removeItem("spotify_code_verifier");
      localStorage.removeItem("spotify_auth_state");

      window.location.replace("spotify.html?connected=1");
    }

    (async () => {
      const error = params.get("error");
      const code = params.get("code");

      if (error) {
        fail(error === "access_denied"
          ? "Cancelaste el permiso de Spotify."
          : "Spotify devolvió este error: " + error);
        return;
      }

      if (!code) {
        fail("No llegó ningún código de autorización.");
        return;
      }

      try {
        await exchangeCode(code);
      } catch (err) {
        console.error(err);
        fail(err.message);
      }
    })();
  </script>
</body>
</html>
