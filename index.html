<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanelista Widgets</title>
  <style>
    :root { color-scheme: dark; --bg:#05070a; --panel:#0a1118; --text:#f6f8fb; --muted:#93a3b5; --cyan:#49cfff; --line:rgba(125,211,252,.18); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at 80% 15%,rgba(73,207,255,.12),transparent 25%),linear-gradient(135deg,var(--bg),#081018 60%,#101a24); color:var(--text); font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:min(100%,760px); }
    h1 { margin:0 0 8px; font-size:clamp(2rem,7vw,4.5rem); letter-spacing:-.05em; }
    .accent { color:var(--cyan); }
    .intro { margin:0 0 30px; color:var(--muted); line-height:1.6; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; }
    .card { display:block; padding:22px; border:1px solid var(--line); border-radius:20px; background:rgba(10,17,24,.82); color:inherit; text-decoration:none; transition:transform .2s ease,border-color .2s ease; }
    .card:hover { transform:translateY(-3px); border-color:rgba(73,207,255,.5); }
    .card h2 { margin:0 0 8px; font-size:1.2rem; }
    .card p { margin:0; color:var(--muted); line-height:1.5; }
  </style>
</head>
<body>
  <main>
    <h1>Kanelista <span class="accent">Widgets</span></h1>
    <p class="intro">Todos tus widgets para Notion viven en una sola página publicada. Abre el que necesites y copia su URL.</p>
    <section class="grid" aria-label="Lista de widgets">
      <a class="card" href="inicio.html">
        <h2>Inicio</h2>
        <p>Saludo, hora, fecha y frase diaria.</p>
      </a>
    </section>
  </main>
</body>
</html>
